<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/strata-round-black-favicon.svg" media="(prefers-color-scheme: light)" />
  <link rel="icon" type="image/svg+xml" href="/strata-white-favicon.svg" media="(prefers-color-scheme: dark)" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Strata — the AI layer that lets data flow across the systems contract dealers and manufacturers already use. Entered once, never re-typed." />
  <title>Strata — AI for contract dealers & manufacturers</title>
  <script>
    // Apply persisted theme before paint to avoid a flash (default: light)
    (function () {
      try {
        if (localStorage.getItem('strata-landing-theme') === 'dark') {
          document.documentElement.classList.add('dark');
        }
      } catch (e) { /* no-op */ }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
